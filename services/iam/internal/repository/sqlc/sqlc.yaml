version: "2"
sql:
  - engine: "postgresql"
    schema:
      - "./schema.sql"
      - "../../../../../db/migrations/iam"
    queries: "./queries"
    gen:
      go:
        package: "generated"
        out: "./generated"
        sql_package: "pgx/v5"
        emit_result_struct_pointers: true
        emit_params_struct_pointers: true
        overrides:
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"